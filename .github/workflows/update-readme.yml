name: Update README with Latest Stats

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'app/models/*.py'
      - 'scripts/update_stats.py'

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Fetch statistics
        run: python scripts/update_stats.py
        env:
          PYTHONUNBUFFERED: 1
