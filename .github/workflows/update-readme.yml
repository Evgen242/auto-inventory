name: Update README

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Update README
        run: |
          echo "# 🚗 Auto Inventory System" > README.md
          echo "" >> README.md
          echo "[![Deploy](https://github.com/Evgen242/auto-inventory/actions/workflows/deploy.yml/badge.svg)](https://github.com/Evgen242/auto-inventory/actions/workflows/deploy.yml)" >> README.md
          echo "" >> README.md
          echo "## 📊 Статистика" >> README.md
          echo "- 🚗 Автомобилей: 10 моделей" >> README.md
          echo "- 🏷️ Марок: 9" >> README.md
          echo "- 🏭 Складов: 7" >> README.md
          echo "- 📦 Всего единиц: 36" >> README.md
          echo "- 💰 Общая стоимость: 51,209,000 ₽" >> README.md
          echo "" >> README.md
          echo "## 🔗 Доступ" >> README.md
          echo "https://autolot25.ddns.net:8086" >> README.md
      - name: Commit
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add README.md
          git commit -m "Update README" || echo "No changes"
          git push || echo "Push failed"
