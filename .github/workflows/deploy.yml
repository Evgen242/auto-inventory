name: 🚀 Deploy to Server

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: 📦 Deploy Production
    runs-on: ubuntu-latest
    needs: [test]  # Ждем успешного прохождения тестов

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v3

    - name: 🔐 Setup SSH
      uses: webfactory/ssh-agent@v0.8.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: 🚀 Deploy to server
      run: |
        ssh -o StrictHostKeyChecking=no deploy@${{ secrets.SERVER_HOST }} << 'EOF'
          cd /var/www/apps/auto-inventory
          git pull origin main
          source venv/bin/activate
          pip install -r requirements.txt
          python -c "from app import create_app, db; app = create_app(); app.app_context().push(); db.create_all()"
          sudo systemctl restart auto-inventory
          sudo systemctl status auto-inventory --no-pager
        EOF

    - name: ✅ Health check
      run: |
        curl -f http://${{ secrets.SERVER_HOST }}/health || exit 1
        echo "✅ Deployment successful!"
