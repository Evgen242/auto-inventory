name: 🧪 Code Quality

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint:
    name: Lint Python code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install linters
        run: |
          pip install flake8 black

      - name: Run flake8
        run: |
          flake8 app/ --count --max-complexity=10 --max-line-length=127 --statistics --exit-zero

      - name: Check formatting with black
        run: |
          black --check app/ --line-length 100 --quiet || echo "Run 'black app/' to fix formatting"

  security:
    name: Basic security check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for hardcoded secrets
        run: |
          if grep -r "SECRET_KEY.*=.*['\"][a-z0-9]" . --exclude-dir=.git --exclude=config.py --exclude=.env* 2>/dev/null; then
            echo "⚠️ Warning: Possible hardcoded secrets found!"
          else
            echo "✅ No hardcoded secrets found"
          fi
