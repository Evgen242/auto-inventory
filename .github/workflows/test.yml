name: 🧪 Run Tests

on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Ручной запуск

jobs:
  test:
    name: 🐍 Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🐍 Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: 📦 Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: 🔧 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-flask pytest-xdist

    - name: 🧪 Run tests with coverage
      run: |
        pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing --ignore=tests/test_app.py
      env:
        SECRET_KEY: test-secret-key-2024
        DATABASE_URL: sqlite:///:memory:
        FLASK_ENV: testing

    - name: 📊 Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

    - name: 📈 Generate coverage report
      run: |
        pytest tests/ --cov=app --cov-report=html
        echo "Coverage report generated in htmlcov/"

    - name: 💾 Upload coverage artifact
      uses: actions/upload-artifact@v3
      with:
        name: coverage-report-${{ matrix.python-version }}
        path: htmlcov/
        retention-days: 7

    - name: ✅ Check test success
      run: |
        pytest tests/ -v --tb=short
        echo "✅ All tests passed!"

  lint:
    name: 🔍 Code Linting
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 🔧 Install linting tools
      run: |
        pip install flake8 black mypy pylint

    - name: 🔍 Run flake8
      run: |
        flake8 app/ --count --max-complexity=10 --max-line-length=127 --statistics

    - name: 🎨 Check formatting with black
      run: |
        black --check app/ --line-length 100

    - name: 🔬 Type check with mypy
      run: |
        mypy app/ --ignore-missing-imports

  security:
    name: 🛡️ Security Scan
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 🔧 Install security tools
      run: |
        pip install bandit safety

    - name: 🔒 Run bandit security scan
      run: |
        bandit -r app/ -f json -o bandit-report.json || true

    - name: 📊 Check vulnerabilities with safety
      run: |
        safety check --full-report

    - name: 💾 Upload security report
      uses: actions/upload-artifact@v3
      with:
        name: security-report
        path: bandit-report.json
        retention-days: 7

  notify:
    name: 📧 Notifications
    needs: [test, lint, security]
    runs-on: ubuntu-latest
    if: always()

    steps:
    - name: 📊 Check status
      run: |
        if [ "${{ needs.test.result }}" == "success" ] && \
           [ "${{ needs.lint.result }}" == "success" ] && \
           [ "${{ needs.security.result }}" == "success" ]; then
          echo "✅ All checks passed!"
        else
          echo "❌ Some checks failed!"
          exit 1
        fi
