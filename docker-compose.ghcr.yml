version: '3.8'

services:
  postgres:
    image: postgres:13
    container_name: auto_inventory_postgres
    environment:
      POSTGRES_DB: auto_inventory
      POSTGRES_USER: deploy
      POSTGRES_PASSWORD: ${DB_PASSWORD:-deploy_password_2026}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - app_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deploy"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/evgen242/auto-inventory:latest
    container_name: auto_inventory_app
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://deploy:${DB_PASSWORD:-deploy_password_2026}@postgres:5432/auto_inventory
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key-in-production}
      - FLASK_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network
    restart: unless-stopped

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
