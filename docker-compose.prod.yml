version: '3.8'

services:
  postgres:
    image: postgres:13
    container_name: auto_inventory_postgres
    environment:
      POSTGRES_DB: auto_inventory
      POSTGRES_USER: deploy
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - app_network
    restart: always

  app:
    image: evgen242/auto-inventory:latest
    container_name: auto_inventory_app
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://deploy:${DB_PASSWORD}@postgres:5432/auto_inventory
      - SECRET_KEY=${SECRET_KEY}
      - FLASK_ENV=production
    depends_on:
      - postgres
    networks:
      - app_network
    restart: always

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
